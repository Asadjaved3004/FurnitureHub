<!DOCTYPE html>
<html>
<head>
<title>Checkout</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #f5f5f5;
}
#paymentIcon {
  transition: all 0.3s ease;
}

.form-box {
  max-width: 500px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
}

input, textarea, select {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
}

button {
  width: 100%;
  padding: 12px;
  background: green;
  color: white;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="form-box">

<h2>Checkout Details</h2>

<input id="name" placeholder="Full Name" required>
<input id="phone" placeholder="Phone Number" required>
<textarea id="address" placeholder="Full Address" required></textarea>

<select id="payment" onchange="updatePaymentUI()">
  <option value="COD">Cash on Delivery</option> 
  <option value="Easypaisa">EasyPaisa</option>
  <option value="Jazzcash">JazzCash</option>
  <option value="Card">Debit / Credit Card</option>
</select>
<div id="paymentIcon"></div>

<!-- DYNAMIC FIELDS GO HERE -->
<div id="paymentFields"></div>

<button onclick="placeOrder()">Place Order</button>

</div>

<script>
function placeOrder() {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;
  let payment = document.getElementById("payment").value;

  let accountNumber = document.getElementById("accountNumber")?.value;
  let cardNumber = document.getElementById("cardNumber")?.value;
  let cvv = document.getElementById("cvv")?.value;
  let expiry = document.getElementById("expiry")?.value;

  if (!name || !phone || !address) {
    alert("Please fill all details");
    return;
  }

  let message = `🛒 Furniture Hub Order\n\n`;

  let total = 0;

  cart.forEach(item => {
    let itemTotal = item.price * item.qty;
    total += itemTotal;

    message += `• ${item.name}
Qty: ${item.qty}
Price: Rs ${item.price}
Subtotal: Rs ${itemTotal}\n\n`;
  });

  message += `💰 Total: Rs ${total}\n\n`;
  message += `👤 Name: ${name}\n`;
  message += `📞 Phone: ${phone}\n`;
  message += `🏠 Address: ${address}\n`;
  message += `💳 Payment Method: ${payment}\n`;

  if (payment === "Easypaisa" || payment === "Jazzcash") {
    message += `📱 Account Number: ${accountNumber}\n`;
  }

  if (payment === "Card") {
    message += `💳 Card Number: ${cardNumber}\n`;
    message += `🔐 CVV: ${cvv}\n`;
    message += `📅 Expiry: ${expiry}\n`;
  }

  let whatsapp = "923161550026";

  window.open(
    "https://wa.me/" + whatsapp + "?text=" + encodeURIComponent(message),
    "_blank"
  );
}

function togglePaymentFields() {
  let method = document.getElementById("payment").value;
  let box = document.getElementById("paymentFields");

  box.innerHTML = "";

  if (method === "Easypaisa" || method === "Jazzcash") {
    box.innerHTML = `
      <input id="accountNumber" placeholder="Enter Account Number">
    `;
  }

  if (method === "Card") {
    box.innerHTML = `
      <input id="cardNumber" placeholder="Card Number">
      <input id="cvv" placeholder="CVV">
      <input id="expiry" placeholder="Expiry Date (MM/YY)">
    `;
  }
}


function updatePaymentUI() {
  let method = document.getElementById("payment").value;
  let iconBox = document.getElementById("paymentIcon");
  let fields = document.getElementById("paymentFields");

  fields.innerHTML = "";

  if (method === "COD") {
    iconBox.innerHTML = "🚚";

  } else if (method === "Easypaisa") {
    iconBox.innerHTML = "📱";
    fields.innerHTML = `<input id="accountNumber" placeholder="EasyPaisa Number">`;

  } else if (method === "Jazzcash") {
    iconBox.innerHTML = "💳";
    fields.innerHTML = `<input id="accountNumber" placeholder="JazzCash Number">`;

  } else if (method === "Card") {
    iconBox.innerHTML = "🏦";
    fields.innerHTML = `
      <input id="cardNumber" placeholder="Card Number">
      <input id="cvv" placeholder="CVV">
      <input id="expiry" placeholder="Expiry">
    `;
  }
}

</script>

</body>
</html>
